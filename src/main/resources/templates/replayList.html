<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Replay List</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div th:replace="fragments/navigation :: backToHome"></div>

<h1>Saved Replays</h1>

<!-- Filtering -->
<form method="get" th:action="@{/replay}" class="filter-form">

    <label>AI 1:</label>
    <select name="ai1">
        <option value="">Any</option>
        <option th:each="p : ${playerTypes}"
                th:value="${p}"
                th:selected="${p == selectedAi1}"
                th:text="${p}">
        </option>
    </select>

    <label>AI 2:</label>
    <select name="ai2">
        <option value="">Any</option>
        <option th:each="p : ${playerTypes}"
                th:value="${p}"
                th:selected="${p == selectedAi2}"
                th:text="${p}">
        </option>
    </select>

    <label>Winner AI:</label>
    <select name="winnerAi">
        <option value="">All</option>
        <option th:each="p : ${playerTypes}"
                th:value="${p}"
                th:selected="${p == selectedWinnerAi}"
                th:text="${p}">
        </option>
    </select>

    <button type="submit">Apply</button>
</form>

<!-- Paging Navigation -->
<div class="paging">

    <a th:if="${currentPage > 0}"
       th:href="@{/replay(
           page=0,
           size=${pageSize},
           ai1=${selectedAi1},
           ai2=${selectedAi2},
           winnerAi=${selectedWinnerAi}
       )}">First</a>

    <a th:if="${currentPage > 0}"
       th:href="@{/replay(
           page=${currentPage - 1},
           size=${pageSize},
           ai1=${selectedAi1},
           ai2=${selectedAi2},
           winnerAi=${selectedWinnerAi}
       )}">Previous</a>

    <span>
        Page <span th:text="${currentPage + 1}"></span>
        of <span th:text="${totalPages}"></span>
    </span>

    <a th:if="${currentPage + 1 < totalPages}"
       th:href="@{/replay(
           page=${currentPage + 1},
           size=${pageSize},
           ai1=${selectedAi1},
           ai2=${selectedAi2},
           winnerAi=${selectedWinnerAi}
       )}">Next</a>

    <a th:if="${currentPage + 1 < totalPages}"
       th:href="@{/replay(
           page=${totalPages - 1},
           size=${pageSize},
           ai1=${selectedAi1},
           ai2=${selectedAi2},
           winnerAi=${selectedWinnerAi}
       )}">Last</a>

</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Player 1</th>
        <th>Player 2</th>
        <th>Winner</th>
        <th>Date</th>
        <th>Replay</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="game : ${games}">
        <td th:text="${game.id}"></td>
        <td th:text="${game.ai1}"></td>
        <td th:text="${game.ai2}"></td>
        <td th:text="${game.winner == 0 ? 'Draw' : (game.winner == 1 ? game.ai1 : game.ai2)}"></td>
        <td th:text="${game.createdAt.format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM-dd HH:mm'))}"></td>
        <td><a th:href="@{/replay/{id}(id=${game.id})}">View</a></td>
    </tr>
    </tbody>
</table>

</body>
</html>
