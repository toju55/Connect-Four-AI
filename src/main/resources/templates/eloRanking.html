<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI ELO Ranking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<h1>AI ELO Ranking</h1>

<table class="simulation-table">
    <tr>
        <th>Rank</th>
        <th>AI</th>
        <th>ELO</th>
        <th>Wins</th>
        <th>Losses</th>
        <th>Draws</th>
    </tr>
    <tr th:each="r, stat : ${rankings}">
        <td th:text="${stat.index + 1}"></td>
        <td th:text="${r.ai}"></td>
        <td th:text="${r.elo}"></td>
        <td th:text="${r.wins}"></td>
        <td th:text="${r.losses}"></td>
        <td th:text="${r.draws}"></td>
    </tr>
</table>

<a th:href="@{/simulate}">Back</a>
</body>
</html>
